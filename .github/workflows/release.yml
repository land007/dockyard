name: release

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [created]

jobs:
  publish-tauri:

    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # for Intel based macs.
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04' # for Intel Linux (x86_64).
            args: '--target x86_64-unknown-linux-gnu'
          - platform: 'ubuntu-24.04-arm' # for ARM64 Linux (aarch64), GitHub free runner for public repos.
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    environment: PROD
    steps:
      - uses: actions/checkout@v4

      - name: sync version from tag (tag is the single source of truth)
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing version to $VERSION (from tag $GITHUB_REF_NAME)"
          sed -i.bak -E 's/^(  "version":[[:space:]]*")[^"]+(",?)$/\1'"$VERSION"'\2/' src-tauri/tauri.conf.json
          sed -i.bak -E '/^name = "dockyard"$/{n;s/^version = "[^"]+"/version = "'"$VERSION"'"/;}' src-tauri/Cargo.toml
          sed -i.bak -E '/^name = "dockyard"$/{n;s/^version = "[^"]+"/version = "'"$VERSION"'"/;}' src-tauri/Cargo.lock
          rm -f src-tauri/tauri.conf.json.bak src-tauri/Cargo.toml.bak src-tauri/Cargo.lock.bak
          echo "---confirmation---"
          grep '"version"' src-tauri/tauri.conf.json | head -1
          grep -A1 '^name = "dockyard"$' src-tauri/Cargo.toml | tail -1
          grep -A1 '^name = "dockyard"$' src-tauri/Cargo.lock | tail -1
          if ! grep -q "\"version\":\s*\"$VERSION\"" src-tauri/tauri.conf.json; then
            echo "::error::sed did not update tauri.conf.json — file format may have changed."
            exit 1
          fi

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.platform == 'ubuntu-22.04' && 'x86_64-unknown-linux-gnu' || matrix.platform == 'ubuntu-24.04-arm' && 'aarch64-unknown-linux-gnu' || '' }}

      - name: install dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libayatana-appindicator3-dev libsoup-3.0-dev

      - name: install frontend dependencies
        run: yarn install

      # Read the changelog file into a variable
      - name: Read changelog
        id: changelog
        run: |
          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          cat CHANGELOG.md
          cat CHANGELOG.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'App ${{ github.ref_name }}'
          releaseBody: ${{ env.RELEASE_BODY }} # Use the changelog content as the release body
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
